# Master Manifest Aggregator Workflow
#
# @intent Run aggregation twice daily on schedule
# @guarantee Fetches all metadat repos, stitches master manifest, publishes to latest release

name: Aggregator

on:
  schedule:
    # Run twice daily: 4 AM CST (10:00 UTC) and 4 PM CST (22:00 UTC)
    - cron: '0 10 * * *'
    - cron: '0 22 * * *'
  # Manual trigger
  workflow_dispatch:

concurrency:
  group: manifest-aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Run aggregator
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AGGREGATOR_RUN_URL: ${{ github.server_url }}/Mesh-ARKade/metadat-main/actions/runs/${{ github.run_id }}
        run: node dist/index.js