# Master Manifest Aggregator Workflow
#
# @intent Run aggregation hourly or on repository dispatch
# @guarantee Fetches all metadat repos, stitches master manifest, publishes to latest release

name: Aggregator

on:
  schedule:
    # Run hourly
    - cron: '0 * * * *'
  # Manual trigger
  workflow_dispatch:
  # Trigger from other repositories
  repository_dispatch:
    types: [update]

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Run aggregator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node dist/index.js
        
      - name: Report status
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
        run: |
          if [ "$STATUS" = "success" ]; then
            echo "✅ Aggregator completed successfully"
          else
            echo "❌ Aggregator failed"
            if [ -n "$DISCORD_WEBHOOK_URL" ]; then
              curl -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d '{"embeds":[{"title":"🔴 Aggregator Failed","color":16711680,"timestamp":"'"$(date -Iseconds)"'"}]}'
            fi
          fi