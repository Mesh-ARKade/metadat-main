# Master Manifest Aggregator Workflow
#
# @intent Run aggregation hourly or on repository dispatch
# @guarantee Fetches all metadat repos, stitches master manifest, publishes to latest release

name: Aggregator

on:
  schedule:
    # Run hourly
    - cron: '0 * * * *'
  # Manual trigger
  workflow_dispatch:
  # Trigger from other repositories
  repository_dispatch:
    types: [source-released]

concurrency:
  group: manifest-aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Run aggregator
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node dist/index.js